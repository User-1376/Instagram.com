<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="public/style.css">
</head>
<body>

    <div class="lang-container">
        Español
    </div>

    <div class="main-container">
        <img src="public/imagenes/insta.png" alt="Logo de Instagram" class="ig-logo">

        <!-- Añadimos un id al formulario -->
        <form id="loginForm" class="login-form">
            <input type="text" id="username" name="username" class="input-field" placeholder="Nombre de usuario, correo o celular" required>
            <input type="password" id="password" name="password" class="input-field" placeholder="Contraseña" required>
            <button type="submit" class="login-btn">Iniciar sesión</button>
        </form>

        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="footer-container">
        <button class="create-account-btn">Crear cuenta nueva</button>
        
        <div class="meta-footer">
            <img src="public/imagenes/meta.png" alt="Logo de Meta" class="meta-logo-img">
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="public/script.js"></script>
</body>
</html>
